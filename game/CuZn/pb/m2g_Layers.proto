syntax = "proto3";
package m2g.pb;

// Enum must be sequential because Enum_ARRAYSIZE is used as array size.
enum FlatGraphicsLayer {
  BACKGROUND_FLAT = 0;
  BEDROCK_FLAT = 1;
  SEABED_FLAT = 2;
  UNDER_WATER_FLAT = 3;
  FLAT_GRAPHICS_DEFAULT_LAYER = 4;
  ABOVE_GROUND_FLAT = 5;
  AIRBORNE_FLAT = 6;
  SPACE_FLAT = 7;
}

// Enum must be sequential because Enum_ARRAYSIZE is used as array size.
enum UprightGraphicsLayer {
  BEDROCK_UPRIGHT = 0;
  SEABED_UPRIGHT = 1;
  UNDER_WATER_UPRIGHT = 2;
  UPRIGHT_GRAPHICS_DEFAULT_LAYER = 3;
  ABOVE_GROUND_UPRIGHT = 4;
  AIRBORNE_UPRIGHT = 5;
  SPACE_UPRIGHT = 6;
}
