syntax = "proto3";
package m2g.pb;

// Enum must be sequential because Enum_ARRAYSIZE is used as array size.
enum FlatGraphicsLayer {
  FLAT_GRAPHICS_DEFAULT_LAYER = 0; // More layers can be added before and/or after the default
  FLAT_GRAPHICS_FOREGROUND_LAYER = 1; // This should represent the frontmost graphics layer
}

// Enum must be sequential because Enum_ARRAYSIZE is used as array size.
enum UprightGraphicsLayer {
  UPRIGHT_GRAPHICS_DEFAULT_LAYER = 0; // More layers can be added before and/or after the default
}
